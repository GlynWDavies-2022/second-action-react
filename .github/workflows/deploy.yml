name: Test Project
on: [push,workflow_dispatch]
jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: Get Code
              uses: actions/checkout@v6
            - name: Setup Node
              uses: actions/setup-node@v4
              with: 
                node-version: 20
            - name: Install Dependencies
              run: npm ci
            - name: Run Tests
              run : npm test
    deploy:
        needs: test
        runs-on: ubuntu-latest
        steps:
            - name: Get Code
              uses: actions/checkout@v6
            - name: Setup Node
              uses: actions/setup-node@v4
              with: 
                node-version: 24
            - name: Install Dependencies
              run: npm ci
            - name: Build Project
              run: npm run build
            - name: Deploy
              run: echo "Deploying to cloud..."